name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - name: macOS (Apple Silicon)
            os: macos-latest # macos-15, native ARM runner
            target: aarch64-apple-darwin
            ext: ""

          - name: macOS (Intel)
            os: macos-13 # last Intel-based macOS runner
            target: x86_64-apple-darwin
            ext: ""

          # ── Linux ──────────────────────────────────────────────────────────
          - name: Linux (x86_64)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
            ext: ""

          - name: Linux (ARM64)
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            ext: ""

          # ── Windows ────────────────────────────────────────────────────────
          - name: Windows (x86_64)
            os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            ext: ".exe"

          - name: Windows (ARM64)
            os: windows-latest
            target: aarch64-pc-windows-msvc
            use_cross: false
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/registry-proxy${{ matrix.ext }}"
          DEST="registry-proxy-${{ matrix.target }}${{ matrix.ext }}"
          cp "${SRC}" "${DEST}"
          echo "ARTIFACT=${DEST}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
